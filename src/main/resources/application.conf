admin-service {

  # ============================================================
  # PostgreSQL — доступ к данным всех сервисов (read-only)
  # ============================================================
  postgres {
    url = "jdbc:postgresql://localhost:5432/tracker_admin"
    url = ${?POSTGRES_URL}
    user = "admin"
    user = ${?POSTGRES_USER}
    password = "admin_pass"
    password = ${?POSTGRES_PASSWORD}
    max-pool-size = 10
  }

  # ============================================================
  # Redis — feature flags, config, maintenance mode
  # ============================================================
  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
  }

  # ============================================================
  # Health Check — настройки опроса сервисов
  # ============================================================
  health-check {
    interval-seconds = 10
    timeout-seconds = 5
    services = [
      "connection-manager",
      "device-manager",
      "history-writer",
      "user-service"
    ]
  }

  # ============================================================
  # HTTP Сервер
  # ============================================================
  server {
    port = 8097
    port = ${?ADMIN_SERVICE_PORT}
  }
}
